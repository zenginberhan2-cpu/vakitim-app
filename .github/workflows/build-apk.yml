name: Vakitim APK Oluştur

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Projeyi indir
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter sürümünü göster
        run: flutter --version

      - name: Paketleri indir
        run: flutter pub get

      - name: Kodu kontrol et
        run: flutter analyze

      - name: APK oluştur
        run: flutter build apk --release

      - name: APK dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: vakitim-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

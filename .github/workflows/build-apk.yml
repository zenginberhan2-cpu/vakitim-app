name: Vakitim APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodlari al
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android uygulamasini hazirla
        run: |
          mkdir -p www
          cp index.html www/index.html
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Vakitim com.vakitim.app --web-dir=www
          npx cap add android

      - name: APK olustur
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK yukle
        uses: actions/upload-artifact@v4
        with:
          name: Vakitim-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
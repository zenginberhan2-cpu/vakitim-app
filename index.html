<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vakitim</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f7a44;
color:white;
}

header{
text-align:center;
font-size:35px;
font-weight:bold;
padding:25px;
}

.card{
background:white;
color:black;
margin:20px;
padding:25px;
border-radius:20px;
}

.vakit{
display:flex;
justify-content:space-between;
font-size:22px;
padding:15px 0;
border-bottom:1px solid #ddd;
}

button{
margin-top:15px;
padding:10px;
font-size:18px;
}
</style>
</head>

<body>

<header>🕌 Vakitim</header>

<div id="durum" style="text-align:center">
📍 Konum alınıyor...
</div>

<div class="card">

<h1 id="sehir">Namaz Vakitleri</h1>

<div class="vakit"><span>İmsak</span><span id="imsak">--:--</span></div>
<div class="vakit"><span>Güneş</span><span id="gunes">--:--</span></div>
<div class="vakit"><span>Öğle</span><span id="ogle">--:--</span></div>
<div class="vakit"><span>İkindi</span><span id="ikindi">--:--</span></div>
<div class="vakit"><span>Akşam</span><span id="aksam">--:--</span></div>
<div class="vakit"><span>Yatsı</span><span id="yatsi">--:--</span></div>

<button onclick="bildirim()">🔔 Bildirim Aç</button>

<h3 id="sayac">
Sonraki vakit hesaplanıyor...
</h3>

</div>


<script>

function bildirim(){

alert("Bildirim özelliği yakında aktif olacak 🕌");

}


navigator.geolocation.getCurrentPosition(
function(pos){

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

vakitGetir(lat,lon);

},
function(){

document.getElementById("durum").innerHTML=
"📍 Konum alınamadı";

vakitGetir(41.0082,28.9784);

}
);


async function vakitGetir(lat,lon){

document.getElementById("durum").innerHTML=
"📍 Konum bulundu";


let url=
`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=13`;


let cevap=await fetch(url);

let veri=await cevap.json();

let v=veri.data.timings;


document.getElementById("imsak").innerHTML=v.Fajr;
document.getElementById("gunes").innerHTML=v.Sunrise;
document.getElementById("ogle").innerHTML=v.Dhuhr;
document.getElementById("ikindi").innerHTML=v.Asr;
document.getElementById("aksam").innerHTML=v.Maghrib;
document.getElementById("yatsi").innerHTML=v.Isha;


document.getElementById("sehir").innerHTML=
veri.data.meta.timezone.split("/")[1]
+" Namaz Vakitleri";


}
async function bildirim() {
      if (!("Notification" in window)) {
          alert("Bu cihaz bildirim özelliğini desteklemiyor.");
              return;
                }

                  const izin = await Notification.requestPermission();

                    if (izin === "granted") {
                        new Notification("🕌 Vakitim", {
                              body: "Namaz vakti bildirimleri açıldı 🔔"
                                  });

                                      alert("🔔 Bildirimler açıldı");
                                        } else {
                                            alert("Bildirim izni verilmedi.");
                                              }
                                              }


</script>

</body>
</html>

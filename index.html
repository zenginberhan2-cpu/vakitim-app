<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vakitim</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f7a44;
color:white;
}

header{
padding:25px;
text-align:center;
font-size:32px;
font-weight:bold;
}

.card{
background:white;
color:black;
margin:20px;
border-radius:20px;
padding:25px;
}

.vakit{
display:flex;
justify-content:space-between;
padding:15px 0;
border-bottom:1px solid #ddd;
font-size:22px;
}

#durum{
text-align:center;
padding:10px;
}
</style>
</head>

<body>

<header>🕌 Vakitim</header>

<div id="durum">📍 Konum alınıyor...</div>

<div class="card">

<h1 id="sehir">Konumunuz</h1>

<div class="vakit" id="satir-imsak">
<span>İmsak</span>
<span id="imsak">--:--</span>
</div>

<div class="vakit">
<span>Güneş</span>
<span id="gunes">--:--</span>
</div>

<div class="vakit" id="satir-ogle">
<span>Öğle</span>
<span id="ogle">--:--</span>
</div>

<div class="vakit" id="satir-ikindi">
<span>İkindi</span>
<span id="ikindi">--:--</span>
</div>

<div class="vakit" id="satir-aksam">
<span>Akşam</span>
<span id="aksam">--:--</span>
</div>

<div class="vakit" id="satir-yatsi">
<span>Yatsı</span>
<span id="yatsi">--:--</span>
</div>
<button id="bildirimButon" onclick="bildirimIzniIste()">
  🔔 Bildirimleri Aç
</button>
<p style="text-align:center;">
🔔 Vakit geldiğinde uyarı alacaksınız
</p>
<div id="sayac" style="text-align:center; margin-top:25px; font-size:22px; font-weight:bold;">
  Sonraki vakit hesaplanıyor...
</div>
</div>

<script>
async function bildirimIzniIste() {

if (!("Notification" in window)){
alert("Bu cihaz bildirimleri desteklemiyor.");
return;
}

const izin = await Notification.requestPermission();

if(izin==="granted"){

document.getElementById("bildirimButon").innerText =
"🔔 Bildirimler Açık";

new Notification("Vakitim",{
body:"Namaz vakitleri için bildirimler açıldı 🕌"
});

}

}

function konumAl(){

navigator.geolocation.getCurrentPosition(

function(position){

const lat = position.coords.latitude;
const lon = position.coords.longitude;

vakitleriGetir(lat, lon);

},

function(error){

document.getElementById("durum").innerText =
"📍 Konum alınamadı";

alert("Konum izni verin ve tekrar deneyin.");

}

);

}


async function vakitleriGetir(lat, lon){

document.getElementById("durum").innerText =
"📍 Konum bulundu";

const adres =
`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=13`;

const cevap = await fetch(adres);
const veri = await cevap.json();

const vakit = veri.data.timings;
const namazlar = [
  ["İmsak", vakit.Fajr, "satir-imsak"],
  ["Öğle", vakit.Dhuhr, "satir-ogle"],
  ["İkindi", vakit.Asr, "satir-ikindi"],
  ["Akşam", vakit.Maghrib, "satir-aksam"],
  ["Yatsı", vakit.Isha, "satir-yatsi"]
];

function sayaciGuncelle() {
  const simdi = new Date();
  let sonraki = null;

  for (const namaz of namazlar) {
    const saat = namaz[1].split(":");
    const zaman = new Date();

    zaman.setHours(
      Number(saat[0]),
      Number(saat[1]),
      0,
      0
    );

    if (zaman > simdi) {
      sonraki = {
        ad: namaz[0],
        zaman: zaman
      };
      document.getElementById("satir-ikindi").style.background = "#d8f3dc";
      break;
    }
  }

  if (!sonraki) {
    document.getElementById("sayac").innerText =
      "🌙 Bugünün vakitleri tamamlandı";
    return;
  }

  const fark = sonraki.zaman - simdi;
  const saat = Math.floor(fark / 3600000);
  const dakika = Math.floor((fark % 3600000) / 60000);
const saniye = Math.floor((fark % 60000) / 1000);
if (fark <= 1000) {
  document.getElementById("sayac").innerText =
    "🕌 " + sonraki.ad + " vakti girdi";
} else {
  document.getElementById("sayac").innerText =
    "⌛ " + sonraki.ad + " vaktine " +
    saat + " saat " + dakika + " dakika " +
    saniye + " saniye kaldı";
}
saniye + " saniye kaldı";
}

sayaciGuncelle();
setInterval(sayaciGuncelle, 1000);
const sehirAdi = veri.data.meta.timezone.split("/").pop();
document.getElementById("imsak").innerText = vakit.Fajr;
document.getElementById("gunes").innerText = vakit.Sunrise;
document.getElementById("ogle").innerText = vakit.Dhuhr;
document.getElementById("ikindi").innerText = vakit.Asr;
document.getElementById("aksam").innerText = vakit.Maghrib;
document.getElementById("yatsi").innerText = vakit.Isha;
document.getElementById("sehir").innerText =
sehirAdi + " Namaz Vakitleri";

}

konumAl();

</script>

</body>
</html>

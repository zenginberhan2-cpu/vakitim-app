<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Vakitim</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #0f7a44;
      color: white;
    }

    header {
      padding: 28px 15px 15px;
      text-align: center;
      font-size: 36px;
      font-weight: bold;
    }

    #durum {
      padding: 12px;
      text-align: center;
      font-size: 20px;
    }

    .card {
      margin: 20px;
      padding: 25px;
      border-radius: 22px;
      background: white;
      color: black;
    }

    #sehir {
      margin-top: 5px;
      font-size: 34px;
    }

    .vakit {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 5px;
      border-bottom: 1px solid #dddddd;
      font-size: 23px;
    }

    .aktif-vakit {
      background: #d8f3dc;
      font-weight: bold;
    }

    #bildirimButon {
      margin-top: 20px;
      padding: 12px 16px;
      border: 1px solid #777777;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
    }

    #sayac {
      margin-top: 28px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      line-height: 1.5;
    }

    @media (max-width: 430px) {
      header {
        font-size: 32px;
      }

      .card {
        margin: 16px;
        padding: 22px;
      }

      #sehir {
        font-size: 30px;
      }

      .vakit {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <header>🕌 Vakitim</header>

  <div id="durum">
    📍 Konum alınıyor...
  </div>

  <main class="card">

    <h1 id="sehir">Namaz Vakitleri</h1>

    <div class="vakit" id="satir-imsak">
      <span>İmsak</span>
      <span id="imsak">--:--</span>
    </div>

    <div class="vakit">
      <span>Güneş</span>
      <span id="gunes">--:--</span>
    </div>

    <div class="vakit" id="satir-ogle">
      <span>Öğle</span>
      <span id="ogle">--:--</span>
    </div>

    <div class="vakit" id="satir-ikindi">
      <span>İkindi</span>
      <span id="ikindi">--:--</span>
    </div>

    <div class="vakit" id="satir-aksam">
      <span>Akşam</span>
      <span id="aksam">--:--</span>
    </div>

    <div class="vakit" id="satir-yatsi">
      <span>Yatsı</span>
      <span id="yatsi">--:--</span>
    </div>

    <button
      id="bildirimButon"
      type="button"
      onclick="bildirimIzniIste()"
    >
      🔔 Bildirimleri Aç
    </button>

    <div id="sayac">
      Sonraki vakit hesaplanıyor...
    </div>

  </main>

<script>
function geriSayim(saatler) {

    let simdi = new Date();
    let hedef = null;

    for(let i=0;i<saatler.length;i++){

    let parca = saatler[i].split(":");

    let tarih = new Date();
    tarih.setHours(parca[0]);
    tarih.setMinutes(parca[1]);
    tarih.setSeconds(0);

    if(tarih > simdi){
    hedef = tarih;
    break;
    }

    }

    if(!hedef){
    hedef = new Date();
    hedef.setDate(hedef.getDate()+1);
    hedef.setHours(saatler[0].split(":")[0]);
    hedef.setMinutes(saatler[0].split(":")[1]);
    }

    setInterval(()=>{

    let simdi = new Date();
    let fark = hedef - simdi;

    let saat = Math.floor(fark/(1000*60*60));
    let dakika = Math.floor((fark%(1000*60*60))/(1000*60));
    let saniye = Math.floor((fark%(1000*60))/1000);

    document.getElementById("sayac").innerHTML =
    "⌛ Sonraki vakte " + saat + " saat " + dakika + " dakika " + saniye + " saniye kaldı";

    },1000);

    }
}
function bildirim(){

alert("Bildirim özelliği yakında aktif olacak 🕌");

}


navigator.geolocation.getCurrentPosition(
function(pos){

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

vakitGetir(lat,lon);

},
function(){

document.getElementById("durum").innerHTML=
"📍 Konum alınamadı";

vakitGetir(41.0082,28.9784);

}
);


async function vakitGetir(lat,lon){

document.getElementById("durum").innerHTML=
"📍 Konum bulundu";

        geriSayimiBaslat([
          {
            ad: "İmsak",
            saat: imsak,
            satir: "satir-imsak"
          },
          {
            ad: "Öğle",
            saat: ogle,
            satir: "satir-ogle"
          },
          {
            ad: "İkindi",
            saat: ikindi,
            satir: "satir-ikindi"
          },
          {
            ad: "Akşam",
            saat: aksam,
            satir: "satir-aksam"
          },
          {
            ad: "Yatsı",
            saat: yatsi,
            satir: "satir-yatsi"
          }
        ]);
      } catch (hata) {
        durum.innerText =
          "⚠️ Namaz vakitleri alınamadı";

        document.getElementById(
          "sayac"
        ).innerText =
          "İnternet bağlantınızı kontrol edin.";
      }
    }

    function geriSayimiBaslat(vakitler) {
      if (sayacZamanlayici) {
        clearInterval(
          sayacZamanlayici
        );
      }

      function guncelle() {
        document
          .querySelectorAll(".vakit")
          .forEach(function (satir) {
            satir.classList.remove(
              "aktif-vakit"
            );
          });

        const simdi =
          new Date();

        let sonrakiAd =
          "İmsak";

        let sonrakiSatir =
          "satir-imsak";

        let hedef =
          null;

        for (const vakit of vakitler) {
          const parcalar =
            vakit.saat.split(":");

          const zaman =
            new Date();

          zaman.setHours(
            Number(parcalar[0]),
            Number(parcalar[1]),
            0,
            0
          );

          if (zaman > simdi) {
            sonrakiAd =
              vakit.ad;

            sonrakiSatir =
              vakit.satir;

            hedef =
              zaman;

            break;
          }
        }

        if (!hedef) {
          const ilkSaat =
            vakitler[0].saat.split(":");

          hedef =
            new Date();

          hedef.setDate(
            hedef.getDate() + 1
          );

          hedef.setHours(
            Number(ilkSaat[0]),
            Number(ilkSaat[1]),
            0,
            0
          );
        }

        const aktifSatir =
          document.getElementById(
            sonrakiSatir
          );

        if (aktifSatir) {
          aktifSatir.classList.add(
            "aktif-vakit"
          );
        }

        const fark =
          hedef.getTime() -
          simdi.getTime();

        const saat =
          Math.floor(
            fark / 3600000
          );

        const dakika =
          Math.floor(
            (fark % 3600000) /
            60000
          );

        const saniye =
          Math.floor(
            (fark % 60000) /
            1000
          );

        document.getElementById(
          "sayac"
        ).innerText =
          "⌛ " +
          sonrakiAd +
          " vaktine " +
          saat +
          " saat " +
          dakika +
          " dakika " +
          saniye +
          " saniye kaldı";
      }

      guncelle();

      sayacZamanlayici =
        setInterval(
          guncelle,
          1000
        );
    }

    konumAl();
  </script>

</body>
</html>
